# =============================================================================
# rt-kanban-websocket.conf — Configuration for the RT Kanban WebSocket server
# =============================================================================
# Perl hash syntax.  Load with:
#   MOJO_CONFIG=/path/to/this/file perl bin/rt-kanban-websocket daemon ...
# =============================================================================
{
  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------

  # Redis connection URL.
  # Formats:  redis://localhost
  #           redis://localhost:6379
  #           redis://:password@localhost:6379
  #           redis://localhost:6379/2      (database 2)
  redis_url => 'redis://localhost',

  # Redis pub/sub channel name.  Must match the channel used in KANBAN.pm.
  channel   => 'rt-ticket-activity',

  # ---------------------------------------------------------------------------
  # RT connection  (used to validate session cookies)
  # ---------------------------------------------------------------------------

  # Base URL of the RT web interface (no trailing slash).
  rt_url    => 'http://localhost:80',

  # Cookie domain sent back to RT when probing the session.
  # Must match the domain your RT is served on.
  rt_domain => 'localhost',

  # Cookie path.
  rt_path   => '/',

  # REST 2.0 endpoint used to validate the client's RT session cookie.
  # The server issues a GET here with the forwarded cookie; a 200 or 403
  # response means the session is valid.  Change the ticket ID if ticket 1
  # does not exist in your RT instance.
  auth_probe_url => 'http://localhost:80/REST/2.0/ticket/1',

  # ---------------------------------------------------------------------------
  # Logging
  # ---------------------------------------------------------------------------

  # Log level: debug | info | warn | error | fatal
  log_level => 'info',
}
